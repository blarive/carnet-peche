<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pêche">
<meta name="theme-color" content="#1a3a4a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Carnet de Pêche</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --eau: #1a3a4a;
    --eau-profonde: #0d2231;
    --eau-claire: #2a6080;
    --sable: #e8d5a3;
    --mousse: #4a7c59;
    --eclair: #f0c040;
    --blanc: #f5f0e8;
    --texte: #1a2a35;
    --gris: #8a9aa5;
    --rouge: #c0392b;
    --radius: 14px;
    --sidebar-w: 240px;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; }

  body {
    font-family:'DM Sans',sans-serif;
    background:#eef2f5;
    color:var(--texte);
    display:flex;
    min-height:100vh;
  }

  /* ── SIDEBAR ─────────────────────────────── */
  .sidebar {
    width:var(--sidebar-w);
    background:linear-gradient(180deg,var(--eau-profonde) 0%,var(--eau) 100%);
    display:flex;
    flex-direction:column;
    flex-shrink:0;
    position:fixed;
    top:0;left:0;bottom:0;
    z-index:100;
    overflow:hidden;
  }
  .sidebar::after {
    content:'';position:absolute;bottom:60px;left:-20%;
    width:140%;height:100px;
    background:rgba(42,96,128,0.2);border-radius:50%;filter:blur(30px);
    animation:vague 7s ease-in-out infinite;pointer-events:none;
  }
  @keyframes vague{0%,100%{transform:translateX(0) scaleY(1)}50%{transform:translateX(4%) scaleY(1.2)}}

  .sidebar-logo { padding:32px 24px 20px; position:relative; z-index:1; }
  .sidebar-logo .icon { font-size:34px;display:block;margin-bottom:8px;filter:drop-shadow(0 2px 8px rgba(240,192,64,0.5)); }
  .sidebar-logo h1 { font-family:'Playfair Display',serif;font-size:19px;color:var(--sable);line-height:1.2; }
  .sidebar-logo p { font-size:10px;color:var(--gris);letter-spacing:1.5px;text-transform:uppercase;margin-top:3px; }

  .sidebar-stats { display:flex;flex-direction:column;gap:8px;padding:0 16px 20px;position:relative;z-index:1; }
  .sidebar-stat { background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center; }
  .sidebar-stat .label { font-size:11px;color:var(--gris);text-transform:uppercase;letter-spacing:0.8px; }
  .sidebar-stat .num { font-family:'Playfair Display',serif;font-size:20px;color:var(--eclair); }

  .sidebar-nav { flex:1;padding:8px 12px;position:relative;z-index:1; }
  .nav-item {
    display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;cursor:pointer;
    color:var(--gris);font-size:14px;font-weight:500;transition:all 0.2s;
    border:none;background:none;width:100%;text-align:left;margin-bottom:4px;
  }
  .nav-item .nav-icon{font-size:20px;width:24px;text-align:center;}
  .nav-item:hover{background:rgba(255,255,255,0.07);color:white;}
  .nav-item.active{background:var(--eclair);color:var(--eau-profonde);font-weight:700;}

  /* ── APP BODY ────────────────────────────── */
  .app-body { flex:1;margin-left:var(--sidebar-w);display:flex;flex-direction:column;min-height:100vh; }

  /* ── TOP BAR ─────────────────────────────── */
  .topbar {
    background:white;border-bottom:1px solid #e0e6ea;
    padding:16px 28px;display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:50;
  }
  .topbar-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--eau-profonde);}
  .topbar-title small{font-family:'DM Sans',sans-serif;font-size:11px;color:var(--gris);font-weight:400;display:block;text-transform:uppercase;letter-spacing:1px;}
  .btn-primary {
    padding:9px 20px;background:linear-gradient(135deg,var(--eau) 0%,var(--eau-claire) 100%);
    color:white;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;
    font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;
    transition:opacity 0.15s,transform 0.15s;
  }
  .btn-primary:hover{opacity:0.9;} .btn-primary:active{transform:scale(0.97);}
  .btn-secondary {
    padding:9px 14px;background:white;color:var(--eau);
    border:1.5px solid #d0dde5;border-radius:10px;font-family:'DM Sans',sans-serif;
    font-size:13px;font-weight:600;cursor:pointer;transition:background 0.15s;
  }
  .btn-secondary:hover{background:#eef4f8;}

  /* ── PAGE CONTENT ────────────────────────── */
  .page-content { flex:1;padding:24px 28px 40px;max-width:1100px; }
  .view{display:none;} .view.active{display:block;}

  /* ── JOURNAL ─────────────────────────────── */
  .journal-toolbar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
  .search-box{position:relative;flex:1;min-width:180px;}
  .search-box input {
    width:100%;padding:10px 14px 10px 36px;border:1.5px solid #ddd;border-radius:10px;
    font-size:14px;font-family:'DM Sans',sans-serif;outline:none;background:white;color:var(--texte);transition:border-color 0.2s;
  }
  .search-box input:focus{border-color:var(--eau-claire);}
  .search-box::before{content:'🔍';position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;}

  .filter-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
  .filter-pill {
    padding:6px 14px;border-radius:20px;border:1.5px solid #ddd;background:white;
    font-size:12px;white-space:nowrap;cursor:pointer;color:var(--gris);
    font-family:'DM Sans',sans-serif;transition:all 0.15s;
  }
  .filter-pill.active{background:var(--eau-profonde);border-color:var(--eau-profonde);color:white;font-weight:600;}

  .cards-grid{display:grid;grid-template-columns:1fr;gap:12px;}

  /* ── CARD / SWIPE ────────────────────────── */
  .card-wrapper{position:relative;border-radius:var(--radius);overflow:hidden;}
  .card-delete-bg {
    position:absolute;top:0;right:0;bottom:0;width:90px;
    background:var(--rouge);display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:4px;color:white;font-size:20px;cursor:pointer;border-radius:var(--radius);
    z-index:2;
  }
  .card-delete-bg span{font-size:10px;font-weight:600;}

  .entry-card {
    background:white;border-radius:var(--radius);padding:16px 18px;
    border-left:4px solid var(--eau-claire);position:relative;
    transition:transform 0.3s cubic-bezier(.2,.8,.3,1);
    will-change:transform;touch-action:pan-y;user-select:none;
    box-shadow:0 1px 6px rgba(0,0,0,0.06);
    z-index:1;
    position:relative;
  }
  .entry-card:hover{box-shadow:0 4px 18px rgba(0,0,0,0.1);}
  .entry-card.swiping{transition:none;}
  .entry-card.trophy{border-left-color:var(--eclair);}

  .btn-delete-desktop {
    display:none;position:absolute;top:12px;right:14px;
    background:#fee;border:1.5px solid #fcc;color:var(--rouge);border-radius:8px;
    padding:4px 10px;font-size:12px;font-weight:600;cursor:pointer;
    font-family:'DM Sans',sans-serif;transition:background 0.15s;
    z-index:3;
  }
  .btn-delete-desktop:hover{background:var(--rouge);color:white;}

  .entry-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;padding-right:90px;}
  .entry-species{font-family:'Playfair Display',serif;font-size:17px;font-style:italic;color:var(--eau-profonde);}
  .entry-date{font-size:11px;color:var(--gris);text-align:right;}
  .entry-meta{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:6px;}
  .entry-meta-item{display:flex;align-items:center;gap:4px;font-size:13px;color:#555;}
  .entry-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
  .tag{padding:3px 10px;border-radius:10px;font-size:11px;background:rgba(42,96,128,0.1);color:var(--eau-claire);font-weight:500;}
  .entry-stars{font-size:13px;margin-top:4px;}
  .entry-notes{font-size:13px;color:#666;margin-top:6px;font-style:italic;line-height:1.4;}
  .photo-badge{display:inline-block;background:linear-gradient(135deg,var(--eclair),#e0a800);color:var(--eau-profonde);padding:2px 9px;border-radius:8px;font-size:10px;font-weight:700;margin-left:6px;}

  .empty-state{text-align:center;padding:56px 24px;color:var(--gris);}
  .empty-state .icon{font-size:56px;margin-bottom:12px;display:block;opacity:0.4;}

  /* ── FORM ────────────────────────────────── */
  .form-layout{display:grid;grid-template-columns:1fr;gap:0;}
  .form-card{background:white;border-radius:var(--radius);padding:24px;box-shadow:0 1px 6px rgba(0,0,0,0.06);margin-bottom:16px;}
  .form-card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--gris);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #eee;}
  .form-group{margin-bottom:14px;}
  .form-label{font-size:11px;font-weight:600;color:var(--gris);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:block;}
  .form-input,.form-select,.form-textarea {
    width:100%;padding:11px 14px;border:1.5px solid #ddd;border-radius:10px;
    font-family:'DM Sans',sans-serif;font-size:14px;color:var(--texte);
    background:#fafaf8;outline:none;transition:border-color 0.2s;appearance:none;
  }
  .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--eau-claire);}
  .form-textarea{resize:none;height:80px;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}

  .stars-input{display:flex;gap:6px;}
  .star-btn{font-size:26px;background:none;border:none;cursor:pointer;filter:grayscale(1) opacity(0.3);transition:all 0.15s;padding:2px;}
  .star-btn.active{filter:none;transform:scale(1.1);}

  .meteo-btns{display:flex;gap:8px;flex-wrap:wrap;}
  .meteo-btn{padding:8px 14px;border:1.5px solid #ddd;border-radius:20px;background:none;font-size:13px;cursor:pointer;transition:all 0.15s;color:var(--texte);font-family:'DM Sans',sans-serif;}
  .meteo-btn.selected{border-color:var(--eau-claire);background:rgba(42,96,128,0.1);color:var(--eau-claire);font-weight:600;}

  .btn-submit{width:100%;padding:14px;background:linear-gradient(135deg,var(--eau) 0%,var(--eau-claire) 100%);color:white;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 4px 16px rgba(26,58,74,0.25);transition:transform 0.15s;}
  .btn-submit:active{transform:scale(0.98);}

  .photo-upload{border:2px dashed #ccc;border-radius:10px;padding:20px;text-align:center;cursor:pointer;background:#fafaf8;transition:border-color 0.2s;}
  .photo-upload:hover{border-color:var(--eau-claire);}
  .photo-upload input{display:none;}
  .photo-upload .icon{font-size:28px;display:block;margin-bottom:6px;}
  .photo-upload p{font-size:13px;color:var(--gris);}
  .photo-preview{width:100%;height:160px;object-fit:cover;border-radius:10px;display:none;}

  /* ── STATS ───────────────────────────────── */
  .stats-grid{display:grid;grid-template-columns:1fr;gap:14px;}
  .stat-card{background:white;border-radius:var(--radius);padding:20px;box-shadow:0 1px 6px rgba(0,0,0,0.06);}
  .stat-card-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--gris);margin-bottom:14px;font-weight:700;}
  .species-bar{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .species-name{font-size:14px;width:100px;flex-shrink:0;color:var(--texte);}
  .bar-track{flex:1;height:8px;background:#eee;border-radius:4px;overflow:hidden;}
  .bar-fill{height:100%;background:linear-gradient(90deg,var(--eau) 0%,var(--eau-claire) 100%);border-radius:4px;transition:width 0.5s ease;}
  .bar-count{font-size:13px;color:var(--gris);min-width:20px;text-align:right;}
  .record-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f0f0f0;}
  .record-item:last-child{border-bottom:none;}
  .record-icon{font-size:26px;}
  .record-info{flex:1;}
  .record-info .species{font-family:'Playfair Display',serif;font-style:italic;font-size:15px;}
  .record-info .detail{font-size:12px;color:var(--gris);margin-top:2px;}
  .record-value{font-family:'Playfair Display',serif;font-size:20px;color:var(--eclair);}

  /* ── MOBILE ONLY ─────────────────────────── */
  .bottom-nav{display:none;}
  .mobile-header{display:none;}
  .mobile-stats-bar{display:none;}

  /* ── TOAST ───────────────────────────────── */
  .toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--mousse);color:white;padding:12px 24px;border-radius:30px;font-size:14px;font-weight:500;opacity:0;transition:all 0.3s;z-index:9999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.15);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  .card-wrapper{animation:slideUp 0.3s ease both;}

  /* ══════════════════════════════════════════
     TABLETTE (768–1024px)
  ══════════════════════════════════════════ */
  @media(min-width:768px){
    .cards-grid{grid-template-columns:1fr 1fr;}
    .stats-grid{grid-template-columns:1fr 1fr;}
    .form-layout{grid-template-columns:1fr 1fr;gap:16px;}
    .form-card.full{grid-column:1/-1;}
    .btn-delete-desktop{display:block;}
    .card-delete-bg{display:none;}
  }

  @media(min-width:1024px){
    .cards-grid{grid-template-columns:1fr 1fr 1fr;}
    .stats-grid{grid-template-columns:1fr 1fr 1fr;}
    .page-content{padding:28px 36px 48px;}
  }

  /* ══════════════════════════════════════════
     MOBILE (< 768px)
  ══════════════════════════════════════════ */
  @media(max-width:767px){
    body{display:block;background:var(--eau-profonde);}
    body::before{content:'';position:fixed;top:0;left:0;right:0;height:210px;background:linear-gradient(180deg,var(--eau) 0%,var(--eau-profonde) 100%);z-index:0;}
    body::after{content:'';position:fixed;top:155px;left:-10%;width:120%;height:70px;background:rgba(42,96,128,0.25);border-radius:50%;filter:blur(20px);animation:vague 6s ease-in-out infinite;z-index:0;}

    .sidebar{display:none;}
    .topbar{display:none;}

    .mobile-header{
      display:block;position:fixed;top:0;left:0;right:0;z-index:50;
      padding:38px 20px 8px;text-align:center;
    }
    .mobile-header .icon{font-size:32px;display:block;margin-bottom:4px;filter:drop-shadow(0 2px 8px rgba(240,192,64,0.5));}
    .mobile-header h1{font-family:'Playfair Display',serif;font-size:20px;color:var(--sable);}

    .mobile-stats-bar{
      display:flex;gap:8px;
      position:fixed;top:104px;left:0;right:0;padding:0 14px;z-index:50;
    }
    .mob-stat{flex:1;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:8px 6px;text-align:center;backdrop-filter:blur(8px);}
    .mob-stat .num{font-family:'Playfair Display',serif;font-size:18px;color:var(--eclair);display:block;}
    .mob-stat .label{font-size:9px;color:var(--gris);text-transform:uppercase;letter-spacing:0.7px;}

    .app-body{
      margin-left:0;background:var(--blanc);
      border-radius:24px 24px 0 0;margin-top:168px;min-height:calc(100vh - 168px);
    }
    .page-content{padding:16px 14px 88px;}
    .cards-grid{grid-template-columns:1fr;}
    .stats-grid{grid-template-columns:1fr;}
    .form-layout{grid-template-columns:1fr;}
    .form-card{padding:16px;}
    .form-row-3{grid-template-columns:1fr;gap:10px;}

    .bottom-nav{
      display:flex;position:fixed;bottom:0;left:0;right:0;
      background:white;border-top:1px solid #eee;
      padding:6px 0 calc(6px + env(safe-area-inset-bottom,0px));z-index:100;
      box-shadow:0 -4px 20px rgba(0,0,0,0.08);
    }
    .mob-nav-btn{flex:1;background:none;border:none;padding:6px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all 0.2s;}
    .mob-nav-btn .nav-icon{font-size:22px;}
    .mob-nav-btn .nav-label{font-size:10px;font-weight:500;color:var(--gris);font-family:'DM Sans',sans-serif;}
    .mob-nav-btn.active .nav-label{color:var(--eau-claire);font-weight:700;}
    .mob-nav-btn:active{transform:scale(0.95);}
    
    .toast{bottom:80px;white-space:normal;text-align:center;max-width:90%;}
    .btn-delete-desktop{display:none;}
    .entry-card-header{padding-right:0;}
  }
</style>
</head>
<body>

<!-- MOBILE HEADER -->
<div class="mobile-header">
  <span class="icon">🎣</span>
  <h1>Carnet de Pêche</h1>
</div>
<div class="mobile-stats-bar">
  <div class="mob-stat"><span class="num" id="m-total">0</span><span class="label">Sorties</span></div>
  <div class="mob-stat"><span class="num" id="m-poissons">0</span><span class="label">Espèces</span></div>
  <div class="mob-stat"><span class="num" id="m-record">—</span><span class="label">Record</span></div>
</div>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <span class="icon">🎣</span>
    <h1>Carnet<br>de Pêche</h1>
    <p>Journal du pêcheur</p>
  </div>
  <div class="sidebar-stats">
    <div class="sidebar-stat"><span class="label">Sorties</span><span class="num" id="s-total">0</span></div>
    <div class="sidebar-stat"><span class="label">Record</span><span class="num" id="s-record" style="font-size:14px">—</span></div>
  </div>
  <nav class="sidebar-nav">
    <button class="nav-item active" data-view="journal" onclick="switchView('journal',this)"><span class="nav-icon">📖</span> Journal</button>
    <button class="nav-item" data-view="ajouter" onclick="switchView('ajouter',this)"><span class="nav-icon">➕</span> Ajouter une prise</button>
    <button class="nav-item" data-view="stats" onclick="switchView('stats',this)"><span class="nav-icon">📊</span> Statistiques</button>
    <div style="height:1px;background:rgba(255,255,255,0.1);margin:10px 4px"></div>
    <button class="nav-item" onclick="exportData()"><span class="nav-icon">📤</span> Exporter</button>
    <button class="nav-item" onclick="document.getElementById('import-file').click()"><span class="nav-icon">📥</span> Importer</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
  </nav>
</aside>

<!-- APP BODY -->
<div class="app-body">

  <div class="topbar">
    <div class="topbar-title" id="topbar-title"><small>Mes sorties</small>Journal de pêche</div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn-secondary" onclick="exportData()" title="Exporter sauvegarde">📤 Exporter</button>
      <button class="btn-secondary" onclick="document.getElementById('import-file').click()" title="Importer sauvegarde">📥 Importer</button>
      <button class="btn-primary" onclick="switchView('ajouter',null)">➕ Nouvelle prise</button>
    </div>
  </div>

  <div class="page-content">

    <!-- JOURNAL -->
    <div class="view active" id="view-journal">
      <div class="journal-toolbar">
        <div class="search-box"><input type="text" placeholder="Rechercher espèce, lieu…" id="search-input" oninput="renderJournal()"></div>
      </div>
      <div class="filter-pills">
        <button class="filter-pill active" onclick="setFilter('tous',this)">Toutes</button>
        <button class="filter-pill" onclick="setFilter('Carpe',this)">🐟 Carpe</button>
        <button class="filter-pill" onclick="setFilter('Brochet',this)">🦈 Brochet</button>
        <button class="filter-pill" onclick="setFilter('Truite',this)">🐠 Truite</button>
        <button class="filter-pill" onclick="setFilter('Sandre',this)">🐡 Sandre</button>
        <button class="filter-pill" onclick="setFilter('Perche',this)">Perche</button>
        <button class="filter-pill" onclick="setFilter('trophy',this)">🏆 Trophées</button>
      </div>
      <div class="cards-grid" id="journal-list"></div>
    </div>

    <!-- AJOUTER -->
    <div class="view" id="view-ajouter">
      <div class="form-layout">

        <div class="form-card">
          <div class="form-card-title">📋 Informations principales</div>
          <div class="form-group">
            <label class="form-label">📅 Date & Heure</label>
            <input type="datetime-local" class="form-input" id="f-date">
          </div>
          <div class="form-group">
            <label class="form-label">🐟 Espèce</label>
            <select class="form-select" id="f-espece">
              <option value="">— Sélectionner —</option>
              <option>Carpe</option><option>Brochet</option><option>Truite fario</option>
              <option>Truite arc-en-ciel</option><option>Sandre</option><option>Perche</option>
              <option>Gardon</option><option>Rotengle</option><option>Tanche</option>
              <option>Anguille</option><option>Black-bass</option><option>Silure</option>
              <option>Barbeau</option><option>Chevesne</option><option>Ablette</option><option>Autre</option>
            </select>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">📏 Taille (cm)</label>
              <input type="number" class="form-input" id="f-taille" placeholder="ex. 45">
            </div>
            <div class="form-group">
              <label class="form-label">⚖️ Poids (g)</label>
              <input type="number" class="form-input" id="f-poids" placeholder="ex. 1200">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">📍 Lieu</label>
            <input type="text" class="form-input" id="f-lieu" placeholder="Étang, rivière, lac…">
          </div>
          <div class="form-group">
            <label class="form-label">🎣 Technique</label>
            <select class="form-select" id="f-technique">
              <option value="">— Technique —</option>
              <option>Carpe — Cheveu</option><option>Lancer — Cuillère</option>
              <option>Lancer — Leurre souple</option><option>Lancer — Popper</option>
              <option>Mouche sèche</option><option>Mouche noyée</option>
              <option>Toc / Vairon</option><option>Feeder</option>
              <option>Bolognaise</option><option>Pêche au coup</option>
              <option>Pêche au posé</option><option>Pêche au vif</option><option>Autre</option>
            </select>
          </div>
        </div>

        <div class="form-card">
          <div class="form-card-title">🌤 Conditions & Notes</div>
          <div class="form-group">
            <label class="form-label">🌤 Météo</label>
            <div class="meteo-btns">
              <button type="button" class="meteo-btn" onclick="toggleMeteo(this,'☀️ Soleil')">☀️ Soleil</button>
              <button type="button" class="meteo-btn" onclick="toggleMeteo(this,'⛅ Nuageux')">⛅ Nuageux</button>
              <button type="button" class="meteo-btn" onclick="toggleMeteo(this,'🌧 Pluie')">🌧 Pluie</button>
              <button type="button" class="meteo-btn" onclick="toggleMeteo(this,'💨 Vent')">💨 Vent</button>
              <button type="button" class="meteo-btn" onclick="toggleMeteo(this,'🌫 Brume')">🌫 Brume</button>
              <button type="button" class="meteo-btn" onclick="toggleMeteo(this,'❄️ Froid')">❄️ Froid</button>
            </div>
          </div>
          <div class="form-row-3">
            <div class="form-group">
              <label class="form-label">🌡 Air (°C)</label>
              <input type="number" class="form-input" id="f-temp-air" placeholder="18">
            </div>
            <div class="form-group">
              <label class="form-label">💧 Eau (°C)</label>
              <input type="number" class="form-input" id="f-temp-eau" placeholder="14">
            </div>
            <div class="form-group">
              <label class="form-label">🌙 Lune</label>
              <select class="form-select" id="f-lune">
                <option value="">—</option>
                <option>🌑 NL</option><option>🌒 CC</option><option>🌓 PQ</option>
                <option>🌔 GC</option><option>🌕 PL</option><option>🌖 GD</option>
                <option>🌗 DQ</option><option>🌘 CD</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">⭐ Note de la sortie</label>
            <div class="stars-input">
              <button type="button" class="star-btn" onclick="setStar(1)">⭐</button>
              <button type="button" class="star-btn" onclick="setStar(2)">⭐</button>
              <button type="button" class="star-btn" onclick="setStar(3)">⭐</button>
              <button type="button" class="star-btn" onclick="setStar(4)">⭐</button>
              <button type="button" class="star-btn" onclick="setStar(5)">⭐</button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">🏅 Statut</label>
            <div class="meteo-btns">
              <button type="button" class="meteo-btn" id="btn-trophy" onclick="toggleTrophy(this)">🏆 Trophée</button>
              <button type="button" class="meteo-btn" id="btn-relache" onclick="toggleRelache(this)">↩️ Remis à l'eau</button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">📝 Notes</label>
            <textarea class="form-textarea" id="f-notes" placeholder="Appâts, conditions, anecdotes…"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">📸 Photo</label>
            <label class="photo-upload" for="f-photo">
              <input type="file" id="f-photo" accept="image/*" onchange="previewPhoto(event)">
              <img class="photo-preview" id="photo-preview" alt="">
              <span class="icon" id="photo-icon">📷</span>
              <p id="photo-text">Ajouter une photo</p>
            </label>
          </div>
          <button class="btn-submit" onclick="saveEntry()">✅ Enregistrer la sortie</button>
        </div>

      </div>
    </div>

    <!-- STATS -->
    <div class="view" id="view-stats">
      <div class="stats-grid" id="stats-content"></div>
    </div>

  </div>
</div>

<!-- BOTTOM NAV (mobile) -->
<nav class="bottom-nav">
  <button class="mob-nav-btn active" data-view="journal" onclick="switchView('journal',this)">
    <span class="nav-icon">📖</span><span class="nav-label">Journal</span>
  </button>
  <button class="mob-nav-btn" data-view="ajouter" onclick="switchView('ajouter',this)">
    <span class="nav-icon">➕</span><span class="nav-label">Ajouter</span>
  </button>
  <button class="mob-nav-btn" data-view="stats" onclick="switchView('stats',this)">
    <span class="nav-icon">📊</span><span class="nav-label">Stats</span>
  </button>
  <button class="mob-nav-btn" onclick="exportData()">
    <span class="nav-icon">📤</span><span class="nav-label">Exporter</span>
  </button>
  <button class="mob-nav-btn" onclick="document.getElementById('import-file').click()">
    <span class="nav-icon">📥</span><span class="nav-label">Importer</span>
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
let entries = JSON.parse(localStorage.getItem('peche-entries')||'[]');
let currentFilter='tous', currentStars=0, selectedMeteo=[], isTrophy=false, isRelache=false, photoData=null;

const topbarTitles = {
  journal:['Mes sorties','Journal de pêche'],
  ajouter:['Nouvelle entrée','Ajouter une prise'],
  stats:["Vue d'ensemble",'Statistiques']
};

function init(){
  const now=new Date(); now.setMinutes(now.getMinutes()-now.getTimezoneOffset());
  const dateInput = document.getElementById('f-date');
  if(dateInput) dateInput.value = now.toISOString().slice(0,16);
  renderJournal(); updateStats(); updateAllStats();
}

function switchView(name, btn){
  // Update views
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  const targetView = document.getElementById('view-'+name);
  if(targetView) targetView.classList.add('active');
  
  // Update sidebar nav buttons
  document.querySelectorAll('.sidebar .nav-item').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.sidebar .nav-item').forEach(b=>{
    if(b.getAttribute('data-view') === name) b.classList.add('active');
  });
  
  // Update mobile nav buttons
  document.querySelectorAll('.mob-nav-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.mob-nav-btn').forEach(b=>{
    if(b.getAttribute('data-view') === name) b.classList.add('active');
  });
  
  // Update topbar title
  const [sub,main] = topbarTitles[name];
  const topbarTitle = document.getElementById('topbar-title');
  if(topbarTitle) topbarTitle.innerHTML = `<small>${sub}</small>${main}`;
  
  // Refresh stats if needed
  if(name === 'stats') updateStats();
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  renderJournal();
}

function setStar(n){
  currentStars=n;
  document.querySelectorAll('.star-btn').forEach((b,i)=>b.classList.toggle('active',i<n));
}

function toggleMeteo(btn,val){
  btn.classList.toggle('selected');
  if(selectedMeteo.includes(val)){
    selectedMeteo = selectedMeteo.filter(v=>v!==val);
  } else {
    selectedMeteo.push(val);
  }
}

function toggleTrophy(btn){
  isTrophy = !isTrophy;
  btn.classList.toggle('selected', isTrophy);
}

function toggleRelache(btn){
  isRelache = !isRelache;
  btn.classList.toggle('selected', isRelache);
}

function previewPhoto(e){
  const file=e.target.files[0]; 
  if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    photoData=ev.target.result;
    const preview = document.getElementById('photo-preview');
    const icon = document.getElementById('photo-icon');
    const text = document.getElementById('photo-text');
    if(preview){
      preview.style.display='block';
      preview.src=photoData;
    }
    if(icon) icon.style.display='none';
    if(text) text.textContent='✅ Photo ajoutée';
  };
  reader.readAsDataURL(file);
}

function saveEntry(){
  const espece=document.getElementById('f-espece').value;
  if(!espece){showToast('⚠️ Sélectionne une espèce !');return;}
  const entry={
    id:Date.now(), 
    date:document.getElementById('f-date').value, 
    espece,
    taille:document.getElementById('f-taille').value||null,
    poids:document.getElementById('f-poids').value||null,
    lieu:document.getElementById('f-lieu').value,
    technique:document.getElementById('f-technique').value,
    meteo:[...selectedMeteo],
    tempAir:document.getElementById('f-temp-air').value||null,
    tempEau:document.getElementById('f-temp-eau').value||null,
    lune:document.getElementById('f-lune').value,
    stars:currentStars, 
    trophy:isTrophy, 
    relache:isRelache,
    notes:document.getElementById('f-notes').value, 
    photo:photoData
  };
  entries.unshift(entry);
  localStorage.setItem('peche-entries',JSON.stringify(entries));
  resetForm(); 
  updateAllStats();
  showToast('🎣 Sortie enregistrée !');
  switchView('journal',null); 
  renderJournal();
}

function resetForm(){
  ['f-espece','f-taille','f-poids','f-lieu','f-technique','f-temp-air','f-temp-eau','f-lune','f-notes']
    .forEach(id=>{
      const el = document.getElementById(id);
      if(el) el.value='';
    });
  document.querySelectorAll('.meteo-btn').forEach(b=>b.classList.remove('selected'));
  document.querySelectorAll('.star-btn').forEach(b=>b.classList.remove('active'));
  const trophyBtn = document.getElementById('btn-trophy');
  const relacheBtn = document.getElementById('btn-relache');
  if(trophyBtn) trophyBtn.classList.remove('selected');
  if(relacheBtn) relacheBtn.classList.remove('selected');
  
  const preview = document.getElementById('photo-preview');
  const icon = document.getElementById('photo-icon');
  const text = document.getElementById('photo-text');
  if(preview) preview.style.display='none';
  if(icon) icon.style.display='block';
  if(text) text.textContent='Ajouter une photo';
  
  selectedMeteo=[];
  currentStars=0;
  isTrophy=false;
  isRelache=false;
  photoData=null;
  
  const now=new Date(); 
  now.setMinutes(now.getMinutes()-now.getTimezoneOffset());
  const dateInput = document.getElementById('f-date');
  if(dateInput) dateInput.value = now.toISOString().slice(0,16);
}

function deleteEntry(id){
  if(!confirm('Supprimer cette entrée ?')) return;
  entries=entries.filter(e=>e.id!==id);
  localStorage.setItem('peche-entries',JSON.stringify(entries));
  renderJournal(); 
  updateAllStats();
  showToast('🗑 Entrée supprimée');
}

function renderJournal(){
  const search=document.getElementById('search-input')?.value.toLowerCase() || '';
  let filtered=entries.filter(e=>{
    if(currentFilter==='trophy') return e.trophy;
    const mF = currentFilter==='tous' || (e.espece && e.espece.includes(currentFilter));
    const mS = !search || (e.espece && e.espece.toLowerCase().includes(search)) || (e.lieu && e.lieu.toLowerCase().includes(search));
    return mF && mS;
  });

  const list=document.getElementById('journal-list');
  if(!list) return;
  
  if(!filtered.length){
    list.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><span class="icon">🎣</span><p>Aucune sortie enregistrée.<br>Ajoutez votre première prise !</p></div>`;
    return;
  }

  const isMobile=window.innerWidth<768;

  list.innerHTML=filtered.map((e,idx)=>{
    const date=e.date?new Date(e.date).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'}):'';
    const heure=e.date?new Date(e.date).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}):'';
    const stars=e.stars?'⭐'.repeat(e.stars):'';
    const tags=[]; 
    if(e.technique) tags.push(e.technique); 
    if(e.relache) tags.push("↩️ Remis à l'eau");
    return `
      <div class="card-wrapper" style="animation-delay:${idx*0.04}s">
        ${isMobile?`<div class="card-delete-bg" onclick="deleteEntry(${e.id})">🗑<span>Supprimer</span></div>`:''}
        <div class="entry-card ${e.trophy?'trophy':''}" data-id="${e.id}">
          <button class="btn-delete-desktop" onclick="deleteEntry(${e.id})">🗑 Supprimer</button>
          <div class="entry-card-header">
            <div>
              <span class="entry-species">${escapeHtml(e.espece)}</span>
              ${e.trophy?'<span class="photo-badge">🏆 Trophée</span>':''}
            </div>
            <div class="entry-date">${date}<br>${heure}</div>
          </div>
          <div class="entry-meta">
            ${e.taille?`<div class="entry-meta-item"><span>📏</span>${e.taille} cm</div>`:''}
            ${e.poids?`<div class="entry-meta-item"><span>⚖️</span>${formatPoids(e.poids)}</div>`:''}
            ${e.lieu?`<div class="entry-meta-item"><span>📍</span>${escapeHtml(e.lieu)}</div>`:''}
            ${e.meteo&&e.meteo.length?`<div class="entry-meta-item">${e.meteo.join(' ')}</div>`:''}
          </div>
          ${stars?`<div class="entry-stars">${stars}</div>`:''}
          ${tags.length?`<div class="entry-tags">${tags.map(t=>`<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>`:''}
          ${e.notes?`<div class="entry-notes">"${escapeHtml(e.notes.slice(0,100))}${e.notes.length>100?'…':''}"</div>`:''}
          ${e.photo?`<div style="margin-top:10px"><img src="${e.photo}" style="width:100%;height:130px;object-fit:cover;border-radius:10px" alt="Photo de prise"></div>`:''}
        </div>
      </div>`;
  }).join('');

  // Swipe (mobile) - improved
  if(isMobile){
    document.querySelectorAll('.card-wrapper').forEach(wrapper=>{
      const card = wrapper.querySelector('.entry-card');
      if(!card) return;
      let startX = 0, currentX = 0, isDragging = false;
      
      card.addEventListener('touchstart', (e) => {
        startX = e.touches[0].clientX;
        isDragging = true;
        card.style.transition = 'none';
      }, {passive: true});
      
      card.addEventListener('touchmove', (e) => {
        if(!isDragging) return;
        currentX = e.touches[0].clientX - startX;
        if(currentX < 0) {
          const translate = Math.max(-90, currentX);
          card.style.transform = `translateX(${translate}px)`;
        }
      }, {passive: true});
      
      card.addEventListener('touchend', () => {
        isDragging = false;
        card.style.transition = 'transform 0.3s cubic-bezier(.2,.8,.3,1)';
        if(currentX < -50) {
          card.style.transform = 'translateX(-90px)';
        } else {
          card.style.transform = '';
        }
        currentX = 0;
      });
    });
  }
}

function escapeHtml(str) {
  if(!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if(m === '&') return '&amp;';
    if(m === '<') return '&lt;';
    if(m === '>') return '&gt;';
    return m;
  });
}

function formatPoids(g){ 
  if(!g) return '';
  return g>=1000?(g/1000).toFixed(2).replace(/\.?0+$/,'')+' kg':g+' g'; 
}

function updateAllStats(){
  const total=entries.length;
  const records=entries.filter(e=>e.poids);
  const rec=records.length?formatPoids(Math.max(...records.map(e=>parseInt(e.poids)))):'—';
  const species=new Set(entries.map(e=>e.espece)).size;
  
  const mTotal = document.getElementById('m-total');
  const mPoissons = document.getElementById('m-poissons');
  const mRecord = document.getElementById('m-record');
  const sTotal = document.getElementById('s-total');
  const sRecord = document.getElementById('s-record');
  
  if(mTotal) mTotal.textContent = total;
  if(mPoissons) mPoissons.textContent = species;
  if(mRecord) mRecord.textContent = rec;
  if(sTotal) sTotal.textContent = total;
  if(sRecord) sRecord.textContent = rec;
}

function updateStats(){
  const el=document.getElementById('stats-content');
  if(!el) return;
  
  if(!entries.length){
    el.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><span class="icon">📊</span><p>Pas encore de données.</p></div>`;
    return;
  }
  const sp={};
  entries.forEach(e=>{sp[e.espece]=(sp[e.espece]||0)+1;});
  const sorted=Object.entries(sp).sort((a,b)=>b[1]-a[1]);
  const maxC=sorted[0]?sorted[0][1]:1;
  const wP=[...entries].filter(e=>e.poids).sort((a,b)=>b.poids-a.poids);
  const wT=[...entries].filter(e=>e.taille).sort((a,b)=>b.taille-a.taille);
  const lx={};
  entries.forEach(e=>{if(e.lieu)lx[e.lieu]=(lx[e.lieu]||0)+1;});
  const tL=Object.entries(lx).sort((a,b)=>b[1]-a[1])[0];

  el.innerHTML=`
    <div class="stat-card">
      <div class="stat-card-title">🐟 Espèces capturées</div>
      ${sorted.map(([s,c])=>`<div class="species-bar"><span class="species-name">${escapeHtml(s)}</span><div class="bar-track"><div class="bar-fill" style="width:${c/maxC*100}%"></div></div><span class="bar-count">${c}</span></div>`).join('')}
    </div>
    ${wP.length||wT.length?`
    <div class="stat-card">
      <div class="stat-card-title">🏆 Records</div>
      ${wP[0]?`<div class="record-item"><span class="record-icon">⚖️</span><div class="record-info"><div class="species">${escapeHtml(wP[0].espece)}</div><div class="detail">${escapeHtml(wP[0].lieu||'Lieu non précisé')}</div></div><span class="record-value">${formatPoids(wP[0].poids)}</span></div>`:''}
      ${wT[0]?`<div class="record-item"><span class="record-icon">📏</span><div class="record-info"><div class="species">${escapeHtml(wT[0].espece)}</div><div class="detail">${escapeHtml(wT[0].lieu||'Lieu non précisé')}</div></div><span class="record-value">${wT[0].taille} cm</span></div>`:''}
    </div>`:''}
    <div class="stat-card">
      <div class="stat-card-title">📋 Résumé</div>
      <div class="record-item"><span class="record-icon">🎣</span><div class="record-info"><div class="species">Total sorties</div></div><span class="record-value">${entries.length}</span></div>
      <div class="record-item"><span class="record-icon">🏆</span><div class="record-info"><div class="species">Trophées</div></div><span class="record-value">${entries.filter(e=>e.trophy).length}</span></div>
      ${tL?`<div class="record-item"><span class="record-icon">📍</span><div class="record-info"><div class="species">Spot favori</div><div class="detail">${tL[1]} visite${tL[1]>1?'s':''}</div></div><span class="record-value" style="font-size:13px;max-width:110px;text-align:right">${escapeHtml(tL[0])}</span></div>`:''}
      <div class="record-item"><span class="record-icon">↩️</span><div class="record-info"><div class="species">Remises à l'eau</div></div><span class="record-value">${entries.filter(e=>e.relache).length}</span></div>
    </div>`;
}

function showToast(msg){
  const t=document.getElementById('toast');
  if(!t) return;
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── EXPORT ───────────────────────────────────────────────────────────────────
function exportData(){
  if(!entries.length){ showToast('⚠️ Aucune donnée à exporter'); return; }
  const data = { version:1, exportDate: new Date().toISOString(), entries };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const date = new Date().toISOString().slice(0,10);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `carnet-peche-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`📤 ${entries.length} sortie(s) exportée(s) !`);
}

// ── IMPORT ───────────────────────────────────────────────────────────────────
function importData(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      const imported = data.entries || data;
      if(!Array.isArray(imported)) throw new Error('Format invalide');
      const avant = entries.length;
      const existingIds = new Set(entries.map(e=>e.id));
      const nouveaux = imported.filter(e=>e.id && !existingIds.has(e.id));
      entries = [...nouveaux, ...entries];
      localStorage.setItem('peche-entries', JSON.stringify(entries));
      renderJournal(); 
      updateAllStats();
      if(document.getElementById('view-stats')?.classList.contains('active')) updateStats();
      showToast(`📥 ${nouveaux.length} nouvelle(s) sortie(s) importée(s) !`);
    } catch(err) {
      showToast('❌ Fichier invalide');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

let rt;
window.addEventListener('resize',()=>{ clearTimeout(rt); rt=setTimeout(()=>{
  renderJournal();
  if(document.getElementById('view-stats')?.classList.contains('active')) updateStats();
},200); });

init();
</script>
</body>
